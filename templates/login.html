<!DOCTYPE html>
<html>
<head>
    <title>Autentificare</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="auth-form">
            <h2>🔐 Autentificare</h2>
            <form method="POST">
                <input type="text" name="username" placeholder="Utilizator" required>
                <input type="password" name="password" placeholder="Parola" required>
                <button type="submit">Intra in cont</button>
            </form>
            <div class="links">
                <p>Nu ai cont? <a href="{{ url_for('register') }}">Inregistreaza-te</a></p>
                <p><a href="{{ url_for('index') }}">← Inapoi la magazin</a></p>
            </div>
        </div>
    </div>
</body>
</html>
